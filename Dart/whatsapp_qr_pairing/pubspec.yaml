name: whatsapp_qr_pairing
description: >
  Dart CLI — QR + emparejamiento WhatsApp (equivalente conceptual a Baileys en Node).
  Usa el paquete neonize (FFI + librería nativa Neonize).
version: 1.0.0

environment:
  sdk: ^3.11.0

dependencies:
  path: ^1.9.0
  neonize: ^1.0.0
  qr: ^3.0.2
  logging: ^1.3.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6

# Neonize Go `Neonize()` adds a `logCb` FFI arg; pub.dev neonize 1.0.0 omits it and
# crashes native (gobytes length / fault). Use patched local copy.
dependency_overrides:
  neonize:
    path: ../third_party/neonize
